name: 📖 Documentation & LLM Context Audit

on:
  pull_request:
    branches: [ main, master ]
    paths:
      - 'src/**'
      - 'bin/**'
      - 'package.json'

permissions:
  contents: write
  pull-requests: write

jobs:
  audit:
    name: AI Documentation Audit
    runs-on: ubuntu-latest

    steps:
      - name: 🚚 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Essential for git diffing

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🔍 Extract API Surface
        id: reflector
        run: |
          # Generate a JSON snapshot of the current public API
          npx tsx bin/redemeine-reflector.ts --json > api-surface.json
          # Generate the new llms.txt content
          npx tsx bin/redemeine-reflector.ts --generate-llms-ctx > new-llms.txt

      - name: 🤖 Update llms.txt
        run: |
          # Only update if the content has actually changed
          if ! cmp -s llms.txt new-llms.txt; then
            mv new-llms.txt llms.txt
            git config --local user.email "action@github.com"
            git config --local user.name "GitHub Action"
            git add llms.txt
            git commit -m "docs(ai): auto-update llms.txt for API changes"
            git push
          fi

      - name: 📚 Generate TypeDoc API Reference
        run: |
          # Generate the markdown files
          npx typedoc
          
          # Check if TypeDoc actually changed anything in the docs/api folder
          if [[ -n $(git status --porcelain docs/api/) ]]; then
            echo "API documentation changed. Committing updates..."
            git config --local user.email "action@github.com"
            git config --local user.name "GitHub Action"
            git add docs/api/
            git commit -m "docs(api): auto-generate updated TypeDoc reference"
            git push
          else
            echo "No changes to API documentation."
          fi

      - name: 🚩 Verify TSDoc Coverage
        run: |
          # Use the reflector to fail the build if public exports lack TSDocs
          npx tsx bin/redemeine-reflector.ts --verify-tsdoc
