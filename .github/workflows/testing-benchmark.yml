name: 📈 Testing Benchmark (Informational)

on:
  pull_request:
    branches: [main, master]
    paths:
      - 'packages/testing/**'
      - '.github/workflows/testing-benchmark.yml'

permissions:
  contents: read

jobs:
  testing-benchmark:
    name: Testing fixture benchmark (non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: 🚚 Checkout Repository
        uses: actions/checkout@v4

      - name: 🥟 Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.11'

      - name: 📦 Install Dependencies
        run: bun install --frozen-lockfile

      - name: 📈 Run testing benchmark baseline
        run: bun run --filter @redemeine/testing bench
